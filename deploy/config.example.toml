# workdir configuration (see `workdir gen-config` for the generated form).
#
# Paths under [runtime] left empty are derived from [server].data_dir at load
# time, so a single data_dir is enough to run anywhere.

[server]
bind = "0.0.0.0:8080"
public_domain = "sandboxes.example.com"   # wildcard DNS: *.sandboxes.example.com
public_https = true
# public_port = 8080   # include in preview URLs when reached on a non-standard port (e.g. a LAN)
data_dir = "/var/lib/workdir"

[node]
role = "all-in-one"          # "all-in-one" (control plane + data plane) or "worker"
node_id = ""                  # generated + persisted on first boot if empty
advertise_addr = ""           # internal address peers use; defaults to bind
total_memory_gb = 0.0         # auto-detected when 0
control_plane_url = ""        # workers: e.g. https://api.sandboxes.example.com
join_token = ""               # workers: token from POST /v1/nodes/join-token
rpc_token = ""                # shared control-plane/worker token for /internal RPC

[runtime]
kind = "firecracker"          # "firecracker" (prod, Linux+/dev/kvm) or "mock" (dev)
firecracker_bin = "/usr/local/bin/firecracker"
jailer_bin = "/usr/local/bin/jailer"
use_jailer = false            # true = run VMMs under jailer; requires root daemon
jailer_uid_base = 100000      # first uid/gid used for per-VM jailer isolation
kernel_image = ""             # defaults to <data_dir>/kernel/vmlinux
images_dir = ""               # defaults to <data_dir>/images
workspace_dir = ""            # defaults to <data_dir>/workspaces
volumes_dir = ""              # defaults to <data_dir>/volumes (persistent volumes)
restore_mem_backend = "file"  # "file"; "uffd" is reserved for a future handler
prewarm_mem_cache = true      # warm snapshot mem files before restore
shared_rootfs = false         # share read-only curated rootfs page cache when images support it
cpu_template = ""             # optional Firecracker CPU template for snapshot portability
quiet_guest_boot = true       # skip serial boot logging (faster cold boot)
jailer_pool_size = 0          # pre-spawned jailers for sub-resume-floor restores (0 = off)
balloon = false               # virtio-balloon: soft standby + guest memory stats
firecracker_no_seccomp = false # true adds --no-seccomp for snapshot/restore troubleshooting

[pricing]
# Worked example for a ~EUR 44/month, 64 GB Hetzner EX44 node.
default_unit_price_usd_hr = 0.009   # base shape (1 unit) target price/hr
monthly_node_cost_usd = 48.0
node_practical_units = 20

[pricing.image_multipliers]
base = 1.0
"node-python" = 1.1
browser = 2.5
"heavy-build" = 2.0
custom = 1.2

[hotpool]
enabled = true
warm_interval_seconds = 5
base_target = 2               # keep 2 base sandboxes ready (spec §25.1)

[standby]
enabled = false               # perpetual standby (validate on the node first)
balloon_idle_seconds = 0      # soft-standby balloon window (0 = off; needs runtime.balloon)

[capacity]
host_reserve_gb = 12.0        # host memory never sold (spec §9.1)
practical_derate = 0.7692     # fraction of theoretical slots admitted statically
overcommit = false            # admit on measured MemAvailable past the static ceiling
overcommit_headroom_gb = 8.0  # measured free memory always kept in reserve
psi_standby_threshold = 0.0   # memory PSI avg10 (%) that triggers early standby (0 = off)

[auth]
bootstrap_admin_key = ""      # set for reproducible installs; else generated once
bootstrap_org = "org_admin"
